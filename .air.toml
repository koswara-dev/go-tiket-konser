# Config file for [Air](https://github.com/cosmtrek/air) in TOML format

# Working directory
root = "."
tmp_dir = "tmp"

[build]
  # Just plain old go build command
  cmd = "go build -o ./tmp/main.exe ."
  # Binary file yields from `cmd`.
  bin = ".\\tmp\\main.exe"
  # Customize binary arguments
  args_bin = []
  # Watch these filename extensions.
  include_ext = ["go", "tpl", "tmpl", "html", "toml"]
  # Ignore these filename extensions or directories.
  exclude_dir = ["assets", "tmp", "vendor"]
  # Watch these directories if you specified.
  include_dir = []
  # Exclude files.
  exclude_file = []
  # Exclude specific regular expressions.
  exclude_regex = ["_test.go"]
  # Exclude unchanged files.
  exclude_unchanged = true
  # Follow symlink for directories
  follow_symlink = true
  # This log file places in your tmp_dir.
  log = "air.log"
  # Delay before rebuilding
  delay = 1000 # ms
  # Stop running old binary when build errors occur.
  stop_on_error = true
  # Send Interrupt signal before killing process (useful for graceful shutdown on Unix, but safe here)
  send_interrupt = false
  # Delay before killing process
  kill_delay = 500 # ms

[color]
  # Customize colors of log messages
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[log]
  time = false

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true
